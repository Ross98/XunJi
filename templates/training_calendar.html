{% if cal %}
<div class="calendar-header">
    <button class="btn btn-nav" hx-get="/training/calendar/{{ cal.prev_year }}/{{ cal.prev_month }}"
            hx-target="#calendar-container" hx-swap="innerHTML">←</button>
    <span class="calendar-title">{{ cal.year }}年 {{ cal.month_name }}</span>
    <button class="btn btn-nav" hx-get="/training/calendar/{{ cal.next_year }}/{{ cal.next_month }}"
            hx-target="#calendar-container" hx-swap="innerHTML">→</button>
</div>
<table class="calendar-grid">
    <thead><tr>
        <th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th><th>日</th>
    </tr></thead>
    <tbody>
    {% for week in cal.weeks %}
        <tr>
        {% for d in week %}
            {% if d.day == 0 %}
            <td class="cal-empty"></td>
            {% else %}
            {% if d.has_data and not d.is_today %}
            <td class="cal-day" style="background: rgba(220,50,50,{{ 0.15 + d.intensity * 0.7 }});color:#fff;"
            {% elif d.is_today %}
            <td class="cal-day cal-today"
            {% else %}
            <td class="cal-day"
            {% endif %}
                hx-get="/training/{{ d.date_str }}"
                hx-target="#training-detail"
                hx-swap="innerHTML"
                hx-trigger="click">
                {{ d.day }}
            </td>
            {% endif %}
        {% endfor %}
        </tr>
    {% endfor %}
    </tbody>
</table>
{% endif %}
